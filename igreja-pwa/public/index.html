<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6B0F0F" />
    <meta name="description" content="App oficial da Igreja Bíblica Batista de Pacatuba" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IBB Pacatuba" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />

    <!-- Open Graph (compartilhamento) -->
    <meta property="og:title" content="Igreja Bíblica Batista de Pacatuba" />
    <meta property="og:description" content="Calendário, Bíblia, Oração e comunidade em um só lugar." />
    <meta property="og:type" content="website" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>IBB Pacatuba</title>
  </head>
  <body>
    <noscript>Este app requer JavaScript para funcionar.</noscript>
    <div id="root"></div>

    <script>
      // Registro do Service Worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((reg) => console.log("SW registrado:", reg.scope))
            .catch((err) => console.error("SW erro:", err));
        });
      }
    </script>
  </body>
</html>
